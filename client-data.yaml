INSTRUCTOR_1_TITLE: "Head Instructor & Founder"
INSTRUCTOR_1_BIO: "Master Rick is the driving force behind Aamerican Colleges of Jiu-Jitsu and Karate, teaching authentic martial arts to the Henrico community for over two decades. His Aam-Ka system — a blend of Karate, Judo, Brazilian Jiu-Jitsu, and Aikido — teaches students to defend themselves effectively at any size, any age."

INSTRUCTOR_2_NAME: "Sensei Katrina"
INSTRUCTOR_2_TITLE: "Instructor & After-School Director"
INSTRUCTOR_2_BIO: "Sensei Katrina brings patience, energy, and genuine care to every class and program she leads. Known for her ability to connect with students of all personalities and skill levels, she oversees the after-school care and summer camp programs that have made ACK a trusted home for Richmond-area families."

